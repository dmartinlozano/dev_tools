apiVersion: v1
kind: Service
metadata:
  name: {{ include "dashboard-frontend.fullname" . }}
  labels:
    app: {{ include "dashboard-frontend.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: {{ include "dashboard-frontend.name" . }}
