<!DOCTYPE html>
<html>
<head>
    <title>Dev Tools installer</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #7ab8fc, #5ca2e0);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-300 to-blue-500">
    <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold mb-4 text-center">Configuration is finished.</h1>
        <p class="text-gray-600 text-center">You will be redirect to dashboard</p>
        <div class="flex justify-end mt-6">
            <button id="finishBtn" class="px-4 py-2 bg-blue-500 text-white rounded-lg shadow hover:bg-blue-600 transition-colors">Accept</button>
        </div>
        <script src="/static/main.js"></script>
    </div>
</body>
</html>
